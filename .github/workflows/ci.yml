name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "2.1.7"
  ANCHOR_VERSION: "0.31.1"
  NODE_VERSION: "20"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.ANCHOR_VERSION }}-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        id: cache-solana
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          if ! anchor --version 2>/dev/null | grep -q "${{ env.ANCHOR_VERSION }}"; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Setup wallet keypair
        run: solana-keygen new --no-bip39-passphrase

      - name: Install Node dependencies
        run: yarn install

      - name: Build and sync program keys
        run: |
          anchor build
          anchor keys sync

      - name: Run tests
        run: anchor test --provider.cluster localnet --provider.wallet ~/.config/solana/id.json

  # M-1: prove the mainnet build refuses to compile without an explicit mint,
  # and that the canonical mainnet USDC is what gets pinned when it's supplied.
  verify-mainnet-mint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Mainnet build MUST fail when SQUADMINT_USDC_MINT is unset
        run: |
          if cargo build -p squad_mint_multi_sig --features mainnet 2>/dev/null; then
            echo "::error::mainnet build succeeded without SQUADMINT_USDC_MINT — env! guard is broken"
            exit 1
          fi
          echo "OK: mainnet build correctly refuses to compile without the mint env var"

      - name: Canonical mainnet USDC is pinned when supplied
        env:
          SQUADMINT_USDC_MINT: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        run: cargo test -p squad_mint_multi_sig --features mainnet

  # Security gate (the "Danger"-style PR enforcement):
  # rustfmt + clippy are hard blockers; the security scanner is advisory until
  # its findings are triaged (flip continue-on-error to false to make it block).
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (with clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-clippy-

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

  # Solana-specific static analysis — missing owner/signer checks, arithmetic
  # overflow, PDA seed issues, account substitution, etc.
  # Radar: https://github.com/Auditware/radar
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Advisory for now: confirm the action ref/inputs against Radar's current
    # README, triage findings, then set this to false to make it a hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Radar static analysis
        uses: Auditware/radar-action@main
        with:
          path: programs
      # Manual alternative (if you prefer not to pin a third-party action):
      #   curl -L https://raw.githubusercontent.com/auditware/radar/main/install-radar.sh | bash
      #   radar -p programs

  # On-chain Rust coverage from the existing TypeScript suite.
  # Uses Trail of Bits' anchor-coverage: it wraps `anchor test` against a
  # patched solana-test-validator that dumps SBF execution traces, then maps
  # them to source lines via DWARF debug info -> LCOV.
  #   https://github.com/trailofbits/anchor-coverage
  # Advisory (continue-on-error): the patched validator tracks Agave 3.x while
  # the main test job pins ${SOLANA_VERSION}; promote to a hard gate once the
  # numbers stabilize. NOTE: DWARF-based line counts are approximate — treat
  # uncovered *regions* as signal, exact hit counts as noise.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-coverage-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-${{ env.ANCHOR_VERSION }}-

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      # Patched agave tools (solana-test-validator with SBF trace support).
      # Releases: https://github.com/trail-of-forks/sbpf-coverage/releases
      - name: Install patched solana-test-validator
        run: |
          curl -L -o patched-agave.tar.gz \
            https://github.com/trail-of-forks/sbpf-coverage/releases/download/v3.0.9/patched-agave-tools-v3.0.9-Linux.tar.gz
          mkdir -p "$HOME/patched-agave"
          tar -xzf patched-agave.tar.gz -C "$HOME/patched-agave"
          # Prepend so the patched binaries win over any other solana install.
          dirname "$(find "$HOME/patched-agave" -name solana-test-validator | head -1)" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          if ! anchor --version 2>/dev/null | grep -q "${{ env.ANCHOR_VERSION }}"; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force
          fi

      - name: Install anchor-coverage
        run: cargo install --git https://github.com/trailofbits/anchor-coverage --locked --force

      - name: Setup wallet keypair
        run: |
          if ! command -v solana-keygen >/dev/null; then
            sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
            echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
            export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          fi
          solana-keygen new --no-bip39-passphrase

      # Coverage needs DWARF info in the .so; CI-only tweak so the production
      # artifact (and its rent cost) is unaffected.
      - name: Enable debug info for coverage build
        run: |
          if grep -q '^\[profile\.release\]' Cargo.toml; then
            sed -i '/^\[profile\.release\]/a debug = true' Cargo.toml
          else
            printf '\n[profile.release]\ndebug = true\n' >> Cargo.toml
          fi

      - name: Install Node dependencies
        run: yarn install

      - name: Build and sync program keys
        run: |
          anchor build
          anchor keys sync

      - name: Run tests under coverage
        run: anchor-coverage --provider.cluster localnet --provider.wallet ~/.config/solana/id.json

      - name: Coverage summary
        run: |
          lcov --summary sbf_trace_dir/*.lcov | tee coverage-summary.txt
          genhtml --output-directory coverage-html sbf_trace_dir/*.lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-html/
            sbf_trace_dir/*.lcov
            coverage-summary.txt
