name: Release (build, then publish draft)

# Manually dispatched against an existing DRAFT release. GitHub Actions cannot
# trigger on draft creation (draft releases don't fire release events), so we
# invert it: build/test/buffer everything first and, only if all of that
# succeeds, flip the draft to published as the final step. workflow_dispatch
# requires repo write access, so this stays maintainer-gated with full secret
# access.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag of the DRAFT release to build & publish (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  RUST_VERSION: "1.86.0"
  SOLANA_VERSION: "2.1.21"
  ANCHOR_VERSION: "0.31.1"
  NODE_VERSION: "22"
  PROGRAM_SO: "target/verifiable/squad_mint_multi_sig.so"
  BUFFER_REFUND: "213ho2JipFkUEvio4CeLehku3cVBs2eqAW18mv7TTSXY"
  AUTHORITY_ADDRESS: "ANNvGaawEDSatXvzMnz1Tr6HrKHaFebo8UrPprAvxAvL"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve & validate version from the input tag
        id: ver
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "$TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "branch=release/${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Tag '$TAG' must be 'vX.Y.Z'"; exit 1
          fi

      # Build from the dispatched commit: the draft's tag ref doesn't exist yet
      # (drafts don't create the git tag until published). Full history for the
      # README PR step below.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      # The input must point at a real DRAFT so the final step has something to
      # publish (and we don't silently re-process an already-public release).
      - name: Verify a draft release exists for the tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          isDraft=$(gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null || echo missing)
          if [ "$isDraft" = "missing" ]; then
            echo "::error::No release found for $TAG — create it as a draft first."; exit 1
          fi
          if [ "$isDraft" != "true" ]; then
            echo "::error::Release $TAG is already published; expected a draft."; exit 1
          fi
          echo "OK: draft release $TAG found."

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # Install anchor-cli directly (pinned tag + --locked) instead of via avm:
      # avm's deps now require rustc >=1.91, which breaks under the pinned 1.86,
      # whereas anchor-cli@v0.31.1's locked deps build fine on 1.86.
      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # GATE: a failed test step fails the job; nothing below runs.
      # Restore the REAL program keypair from the secret so the test runs under
      # declare_id! (BW1...) — the same id the verifiable build below ships. We
      # do NOT use the ephemeral sed fallback here: that would rewrite declare_id!
      # and the release artifact would carry the wrong program id. Fail fast if
      # the secret is missing.
      - name: Tests (gate)
        env:
          PROGRAM_KEYPAIR: ${{ secrets.PROGRAM_KEYPAIR }}
        run: |
          set -euo pipefail
          test -n "${PROGRAM_KEYPAIR:-}" || { echo "::error::PROGRAM_KEYPAIR secret is required for releases"; exit 1; }
          mkdir -p target/deploy
          printf '%s' "$PROGRAM_KEYPAIR" > target/deploy/squad_mint_multi_sig-keypair.json
          KP_ID=$(solana address -k target/deploy/squad_mint_multi_sig-keypair.json)
          DECL=$(grep -oP 'declare_id!\("\K[^"]+' programs/squad_mint_multi_sig/src/lib.rs)
          [ "$KP_ID" = "$DECL" ] || { echo "::error::program keypair ($KP_ID) != declare_id! ($DECL)"; exit 1; }
          echo "Program id: $KP_ID"
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
          solana-keygen new --no-bip39-passphrase -o ~/keypair-dev-1.json
          yarn install --frozen-lockfile
          anchor test

      - name: Verifiable prod build
        run: anchor run build-prod-verifiable

      - name: Hash the artifact
        id: hash
        run: echo "sha256=$(sha256sum "${PROGRAM_SO}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      # Attach the .so (+ checksum) to the DRAFT release (still private at this
      # point — it goes public only in the final publish step).
      - name: Attach .so to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha256sum "${PROGRAM_SO}" > squad_mint_multi_sig.so.sha256
          gh release upload "${{ github.event.inputs.tag }}" \
            "${PROGRAM_SO}" squad_mint_multi_sig.so.sha256 --clobber

      # Attach the Anchor IDL (+ checksum) so integrators — the mobile app, the
      # backend, explorers — can pin the exact program interface for this build.
      # The IDL is emitted into target/idl/ by the `anchor test` build above.
      - name: Attach IDL to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IDL="target/idl/squad_mint_multi_sig.json"
          test -f "$IDL" || { echo "::error::IDL not found at $IDL (expected from the anchor build)"; exit 1; }
          # Clean asset name + path-free checksum file.
          cp "$IDL" squad_mint_multi_sig.idl.json
          sha256sum squad_mint_multi_sig.idl.json > squad_mint_multi_sig.idl.json.sha256
          gh release upload "${{ github.event.inputs.tag }}" \
            squad_mint_multi_sig.idl.json squad_mint_multi_sig.idl.json.sha256 --clobber

      # Keypair to $HOME (never the repo) so it can't be committed.
      - name: Point CLI at mainnet + deployer
        run: |
          solana config set --url "${{ secrets.RPC_URL }}"
          printf '%s' '${{ secrets.DEPLOYER_KEYPAIR }}' > "$HOME/deployer.json"
          solana config set --keypair "$HOME/deployer.json"

      - name: Write buffer & set authority to the vault
        id: buffer
        run: |
          solana program write-buffer "${PROGRAM_SO}" | tee /tmp/wb.txt
          BUFFER="$(sed -n 's/^Buffer: //p' /tmp/wb.txt | tr -d '[:space:]')"
          test -n "$BUFFER" || { echo "could not parse buffer address"; exit 1; }
          solana program set-buffer-authority "$BUFFER" \
            --new-buffer-authority "${AUTHORITY_ADDRESS}"
          echo "buffer=$BUFFER" >> "$GITHUB_OUTPUT"

      - name: Update README release block
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ steps.hash.outputs.sha256 }}
          BUFFER: ${{ steps.buffer.outputs.buffer }}
          PROGRAM_ID: ${{ vars.PROGRAM_ID }}
        run: |
          python3 - <<'PY'
          import os, re, datetime
          ver, sha, buf = os.environ["VERSION"], os.environ["SHA"], os.environ["BUFFER"]
          prog, now = os.environ["PROGRAM_ID"], datetime.date.today().isoformat()
          block = (
            "<!-- RELEASE-INFO:START -->\n"
            f"- **Version:** {ver}\n"
            f"- **Program ID:** {prog}\n"
            f"- **Verifiable .so SHA-256:** `{sha}`\n"
            f"- **Upgrade buffer:** {buf}\n"
            f"- **Prepared:** {now}\n"
            "<!-- RELEASE-INFO:END -->"
          )
          p = "README.md"; s = open(p).read()
          pat = re.compile(r"<!-- RELEASE-INFO:START -->.*?<!-- RELEASE-INFO:END -->", re.S)
          s = pat.sub(block, s) if pat.search(s) else s + "\n\n## Latest mainnet release\n\n" + block + "\n"
          open(p, "w").write(s)
          PY

      # Branch release/vX.Y.Z, commit ONLY the README, open the PR to main.
      - name: Open PR to main
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.ver.outputs.branch }}
          base: main
          add-paths: README.md
          commit-message: "release: ${{ steps.ver.outputs.version }}"
          title: "Release ${{ steps.ver.outputs.version }}"
          body: |
            Automated from published release **${{ steps.ver.outputs.version }}**.

            ## Squads upgrade — paste these into the Squads app
            - **Name of the upgrade:** ${{ steps.ver.outputs.version }}
            - **Buffer Address:** ${{ steps.buffer.outputs.buffer }}
            - **Buffer Refund:** ${{ env.BUFFER_REFUND }}
            - **Commit Link:** ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
            - **Authority Address:** ${{ env.AUTHORITY_ADDRESS }}

            ## Build
            - Program ID: `${{ vars.PROGRAM_ID }}`
            - Verifiable `.so` SHA-256: `${{ steps.hash.outputs.sha256 }}`
            - Tests passed; `.so` attached to release ${{ steps.ver.outputs.version }}.

      # FINAL: everything above passed — flip the draft to published. Reached
      # only on success, so a failure anywhere leaves the release as a draft.
      # --target pins the published tag to the exact commit that was built.
      - name: Publish the release (draft -> published)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          gh release edit "$TAG" --draft=false --target "${{ github.sha }}"
          echo "Published $TAG at ${{ github.sha }}"
