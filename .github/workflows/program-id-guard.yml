name: Program ID guard

# Cheap, secretless tripwire: fails a PR the moment declare_id!(), Anchor.toml
# [programs.*], (and a committed deploy keypair, if any) disagree on the program
# id. This is what would have caught the devnet deploy drifting to a NEW address
# (JC38P1y…) instead of upgrading BW1dtKf…. Runs in ~seconds, no toolchain.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  program-id:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Assert program id is pinned consistently
        run: bash scripts/check-program-id.sh
